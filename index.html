<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sign Bridge AI - Pro Final</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        :root { --primary: #0f0c29; --accent: #00f2fe; --chat-ai: #e3f2fd; --chat-user: #1e272e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }

        body { 
            background: linear-gradient(to bottom, #0f0c29, #302b63); color: white; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header */
        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: white; padding: 5px; }
        
        /* Settings Panel */
        .settings-panel {
            position: fixed; top: 60px; right: 15px; background: white; color: #333; 
            padding: 20px; border-radius: 15px; display: none; flex-direction: column; gap: 15px;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 220px;
        }
        .settings-panel label { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; cursor: pointer; }

        /* Camera Box */
        .camera-box { padding: 10px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        #webcam-container { 
            border: 4px solid var(--accent); border-radius: 25px; 
            /* Camera box perithaakka varapattuḷḷathu */
            width: 250px; /* modified: increased size */
            height: 250px; /* modified: increased size */
            overflow: hidden; background: #000;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }
        canvas { width: 100% !important; height: 100% !important; object-fit: cover; }

        #label-display { 
            font-size: 18px; font-weight: bold; color: #f1c40f; 
            margin: 10px 0; min-height: 25px; text-align: center;
        }

        /* Chat Section */
        .chat-container {
            background: #f8f9fa; border-radius: 30px 30px 0 0; 
            flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Bubble & Image Styles */
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 16px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ai { background: var(--chat-ai); color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--chat-user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .sign-img { display: block; width: 140px; height: 140px; object-fit: contain; margin-top: 10px; border-radius: 12px; background: white; border: 1px solid #ddd; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        .action-btn { padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* Input Bar */
        /* Text box mela varapattuḷḷathu */
        .input-bar { 
            padding: 10px 15px 10px; /* modified: reduced bottom padding */
            display: flex; gap: 10px; background: white; border-top: 1px solid #eee; 
            margin-bottom: 25px; /* added: moves up */
        }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; background: #f1f2f6; }
        .send-icon { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: #0f0c29; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: 800; color: var(--accent); flex-grow: 1; text-align: center;">Sign To Text</span> <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="settings-panel" id="settings">
        <h3 style="margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #eee;">Settings</h3>
        <label>🔊 Voice Output <input type="checkbox" id="voice-toggle" checked></label>
        <label>📝 Sentence Mode <input type="checkbox" id="mode-toggle"></label>
        <button onclick="clearChat()" style="border:none; background:#ff4757; color:white; padding:10px; border-radius:8px; margin-top:10px; cursor:pointer;">🗑️ Clear Chat</button>
    </div>

    <div class="camera-box">
        <div id="webcam-container"></div>
        <div id="label-display">INITIALIZING...</div>
        <div class="btn-group">
            <button class="action-btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="resetDetection()">🔄 Reset</button>
            <button class="action-btn" style="background: #2ed573; color: #000;" onclick="addSignToChat()">➕ Add to Chat</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-window"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Type message...">
            <button class="send-icon" onclick="manualSend()">➤</button>
        </div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/lD9EQ4Fl_/"; 
        let model, webcam, lastDetected = "", currentSentence = [];

        async function init() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                // Camera box perithaa mathiya pothu, ingeyum maatha venum
                webcam = new tmImage.Webcam(250, 250, false); /* modified: increased size */
                await webcam.setup({ facingMode: "environment" });
                await webcam.play();
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                document.getElementById("label-display").innerText = "READY";
                window.requestAnimationFrame(loop);
            } catch (e) { document.getElementById("label-display").innerText = "CAM ERROR"; }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let best = prediction.reduce((prev, curr) => (curr.probability > prev.probability) ? curr : prev);

            // 98% மேல் துல்லியம், Background இல்லை மற்றும் புதிய வார்த்தை என்றால் மட்டும் எடுக்கும்
            if (best.probability > 0.98 && best.className !== "Background" && best.className !== lastDetected) {
                handleResult(best.className);
                lastDetected = best.className;
            }
        }

        function handleResult(sign) {
            const display = document.getElementById("label-display");
            const isSentenceMode = document.getElementById("mode-toggle").checked;

            if (isSentenceMode) {
                currentSentence.push(sign);
                display.innerText = currentSentence.join(" ");
            } else {
                display.innerText = sign;
                addToChat(sign, 'ai');
                speakText(sign);
            }
        }

        function addToChat(text, sender) {
            const win = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.className = `bubble ${sender}`;
            div.innerText = text.toUpperCase();
            win.appendChild(div);
            
            // வார்த்தை ஒருவேளை வாக்கியமாக இருந்தால் (Sentence Mode), அதன் முதல் வார்த்தைக்கு மட்டும் படம் தேடும்
            const firstWord = text.split(" ")[0];
            addImageToBubble(div, firstWord);
            
            win.scrollTop = win.scrollHeight;
        }

        function addImageToBubble(bubble, word) {
            const formats = ['jpg', 'png', 'jpeg', 'webp'];
            let found = false;
            function tryFormat(index) {
                if (index >= formats.length || found) return;
                const img = new Image();
                img.src = "image/" + word.toLowerCase().trim() + "." + formats[index];
                img.onload = function() {
                    if(!found) { img.className = "sign-img"; bubble.appendChild(img); found = true; }
                };
                img.onerror = () => tryFormat(index + 1);
            }
            tryFormat(0);
        }

        function addSignToChat() {
            const display = document.getElementById("label-display");
            const text = display.innerText;
            if (text !== "READY" && text !== "") {
                addToChat(text, 'ai');
                speakText(text);
                resetDetection();
            }
        }

        function speakText(text) {
            const isVoiceOn = document.getElementById("voice-toggle").checked;
            if (isVoiceOn && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            }
        }

        function toggleSettings() {
            const panel = document.getElementById("settings");
            panel.style.display = (panel.style.display === "flex") ? "none" : "flex";
        }

        function manualSend() {
            const input = document.getElementById("chat-input");
            if (input.value.trim()) {
                addToChat(input.value, 'user');
                speakText(input.value);
                input.value = "";
            }
        }

        function resetDetection() {
            lastDetected = "";
            currentSentence = [];
            document.getElementById("label-display").innerText = "READY";
        }

        function clearChat() {
            if(confirm("Clear conversation?")) {
                document.getElementById("chat-window").innerHTML = "";
                toggleSettings();
            }
        }

        init();
    </script>
</body>
</html>
